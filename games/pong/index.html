<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pong Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <div class="scoreboard">
            <div class="player-score">
                <span class="label">Player</span>
                <span class="score" id="playerScore">0</span>
            </div>
            <div class="game-title">PONG</div>
            <div class="computer-score">
                <span class="score" id="computerScore">0</span>
                <span class="label">Computer</span>
            </div>
        </div>
        
        <canvas id="pongCanvas" width="800" height="400"></canvas>
        
        <div class="controls">
            <p>🖱️ <strong>Mouse:</strong> Move paddle vertically</p>
            <p>⬆️⬇️ <strong>Arrow Keys:</strong> Up/Down to move paddle</p>
            <p>🔄 <strong>Space:</strong> Reset game | <strong>P:</strong> Pause</p>
        </div>
    </div>
    
    <script src="game.js"></script>
</body>
</html>
